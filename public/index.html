<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MonWe Trading — Telegram MT5</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MonWe">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/favicon.png">
<meta http-equiv="refresh" content="0; url=/dashboard.html">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0a0e1a 0%,#111827 100%);color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;display:grid;place-items:center;text-align:center}
.box{padding:40px}
.logo{width:64px;height:64px;background:linear-gradient(135deg,#00d4ff,#0080ff);border-radius:16px;display:grid;place-items:center;font-size:32px;margin:0 auto 24px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.05);opacity:.85}}
h1{font-size:24px;margin-bottom:8px;color:#00d4ff}
p{color:#64748b;font-size:14px;margin-bottom:20px}
a{color:#00d4ff;text-decoration:none;font-weight:600}
a:hover{text-decoration:underline}
.spinner{width:32px;height:32px;border:3px solid #253047;border-top-color:#00d4ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box">
  <div class="logo">📈</div>
  <h1>MonWe Trading</h1>
  <p>Redirection vers le dashboard...</p>
  <div class="spinner"></div>
  <p style="margin-top:20px;font-size:12px">Si rien ne se passe, <a href="/dashboard.html">clique ici</a></p>
</div>
<script>window.location.replace('/dashboard.html');</script>
</body>
</html>
